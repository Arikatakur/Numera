name: Numera

options:
  bundleIdPrefix: org.clientvault
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  generateEmptyDirectories: false

packages:
  SupabaseSwift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"

targets:
  Numera:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Numera

    dependencies:
      - package: SupabaseSwift
        product: Supabase

    info:
      path: Numera/Resources/Info.plist
      properties:
        CFBundleDisplayName: Numera
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Numera uses Face ID to keep your financial data private."

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.clientvault.numera
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Numera/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          SWIFT_OPTIMIZATION_LEVEL: "-O"

    scheme:
      testTargets: []

schemes:
  Numera:
    build:
      targets:
        Numera: all
    run:
      config: Debug
      # Local StoreKit testing: simulated Numera Pro products (monthly/yearly/
      # lifetime + 14-day trial) without App Store Connect.
      storeKitConfiguration: Numera/Resources/Numera.storekit
    test:
      config: Debug
      targets: []
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
