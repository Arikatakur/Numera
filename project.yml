name: Numera

options:
  bundleIdPrefix: org.clientvault
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"

targets:
  Numera:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Numera

    info:
      path: Numera/Resources/Info.plist
      properties:
        CFBundleDisplayName: Numera
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Numera uses Face ID to keep your financial data private."

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.clientvault.numera
        INFOPLIST_FILE: Numera/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          CODE_SIGN_STYLE: Automatic
        Release:
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore org.clientvault.numera"

    scheme:
      testTargets: []

schemes:
  Numera:
    build:
      targets:
        Numera: all
    run:
      config: Debug
    test:
      config: Debug
      targets: []
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
