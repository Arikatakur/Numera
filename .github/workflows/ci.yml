name: CI

on:
  push:
    branches: [ main, "feature/**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile Check
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Liquid Glass (.glassEffect) only compiles with the iOS 26 SDK.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project Numera.xcodeproj \
            -scheme Numera \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet
